body:
  text: 太乙元眞保命長生經太乙元眞曰積陽爲神積隂爲形隂陽两半合成其身猶如日月麗於虚空畫夜不息各行其分憂悲喜怒逓相攻奪生老病死因之而有夫前識者道之子形化者道之母既知其子須識其母母者太上之分身也子者本心中之一也二者合同胎養形魂人能識之可以長存故善精思者内視不瞬内聴不昧使欲者不欲不欲者欲以陽化隂以和化心心和炁靜隂弱神正神正則精專精專則影滅影滅則形忘形忘則神應神應則和同和同則天上精光可入精光既入陽炁獨化舉身排空所適无礙亦如還丹入口却諸隂累專隂致神以致不死喭爾仙衆諸神文呪曰三清上境太乙元眞布和法化開光度人錬魂日宮校魄月輪天帝緫炁地宮飛塵千二百靈萬二千神合成仙宅立爲眞身眞身之中七政九宮心光朗耀照玄明宮明空大神和炁心眞内清五藏外召五神精思不窮開光度人老者反壯故者還新飲食六甲三景同春十二吏兵保衛爾身日誦千徧上朝元君元眞老君至道獨存保爾元命衛爾靈根勤叩天鼓和形鋉魂齋誦不忘當見神尊䇿空駕浮昇天躡雲誦前呪訖則注目存神引神炁攻一切人身中萬病立瘥若修長生得道之法即誦此呪滿十萬徧即端坐内思更莫外縁不經十年自然成道若護國帝主保時道君當誦此經冲神保命行功救人隂陽不愆風雨調順若有兵革水旱當依太乙聖眞經鑄十六眞人及太乙眞像修行齋籙則所向皆勝其法具載太乙聖眞經若逢修眞道士則盟壇受之若遇凡流則不得妄傳必殃九祖謫罰六親戒之祕之如護眼目諸仙聞巳朝禮依行各還本宮精思妙道藏之金櫃祕之玉函畫夜齋誦勿常示人唯仙門師當依此教太乙元眞保命長生經
