body:
  text: 太乙元真保命長生經太乙元真曰積陽為神積隂為形隂陽兩半合成其身猶如日月麗於虛空畫夜不息各行其分憂悲喜怒遞相攻奪生老病死因之而有夫前識者道之子形化者道之母既知其子須識其母母者太上之分身也子者本心中之一也二者合同胎養形魂人能識之可以長存故善精思者內視不瞬內聽不昧使欲者不欲不欲者欲以陽化隂以和化心心和氣靜隂弱神正神正則精專精專則影滅影滅則形忘形忘則神應神應則和同和同則天上精光可入精光既入陽氣獨化舉身排空所適無礙亦如還丹入口却諸隂纍專隂致神以致不死唁爾仙衆諸神文呪曰三清上境太乙元真布和法化開光度人錬魂日宮校魄月輪天帝總氣地宮飛塵千二百靈萬二千神合成仙宅立為真身真身之中七政九宮心光朗耀照玄明宮明空大神和氣心真內清五藏外召五神精思不窮開光度人老者反壯故者還新飲食六甲三景同春十二吏兵保衛爾身日誦千遍上朝元君元真老君至道獨存保爾元命衛爾靈根勤叩天鼓和形鋉魂齋誦不忘當見神尊䇿空駕浮升天躡雲誦前呪訖則注目存神引神氣攻一切人身中萬病立瘥若修長生得道之法即誦此呪滿十萬遍即端坐內思更莫外緣不經十年自然成道若護國帝主保時道君當誦此經沖神保命行功救人隂陽不愆風雨調順若有兵革水旱當依太乙聖真經鑄十六真人及太乙真像修行齋籙則所向皆勝其法具載太乙聖真經若逢修真道士則盟壇受之若遇凡流則不得妄傳必殃九祖謫罰六親戒之祕之如護眼目諸仙聞巳朝禮依行各還本宮精思妙道藏之金匱祕之玉函畫夜齋誦勿常示人唯仙門師當依此教太乙元真保命長生經
